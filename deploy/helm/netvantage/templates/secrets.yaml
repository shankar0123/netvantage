# Example secret — override with your own values or use external secrets operator.
# This template creates the secrets if they don't already exist.
apiVersion: v1
kind: Secret
metadata:
  name: netvantage-secrets
  labels:
    {{- include "netvantage.labels" . | nindent 4 }}
type: Opaque
stringData:
  NETVANTAGE_DB_URL: "postgres://netvantage:CHANGE_ME@{{ include "netvantage.fullname" . }}-postgresql:5432/netvantage?sslmode=require"
  NETVANTAGE_JWT_SECRET: "CHANGE_ME_GENERATE_RANDOM_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: netvantage-db-secret
  labels:
    {{- include "netvantage.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: "CHANGE_ME"
  password: "CHANGE_ME"
