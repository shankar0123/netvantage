apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netvantage.fullname" . }}-processor
  labels:
    {{- include "netvantage.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  replicas: {{ .Values.processor.replicaCount }}
  selector:
    matchLabels:
      {{- include "netvantage.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: processor
  template:
    metadata:
      labels:
        {{- include "netvantage.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: processor
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: processor
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.processor.image.repository }}:{{ .Values.processor.image.tag }}"
          imagePullPolicy: {{ .Values.processor.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.processor.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netvantage.fullname" . }}-processor
  labels:
    {{- include "netvantage.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  type: {{ .Values.processor.service.type }}
  ports:
    - port: {{ .Values.processor.service.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "netvantage.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: processor
