# NetVantage Development Stack
#
# Usage:
#   docker compose up -d        # Start all services
#   docker compose down          # Stop all services
#   docker compose down -v       # Stop and remove volumes (clean slate)
#
# For production-like settings, use:
#   docker compose --env-file .env.production up -d
#
# Services:
#   - NATS JetStream (transport, default)
#   - Prometheus (metrics storage)
#   - Grafana (dashboards, with optional OAuth2/OIDC SSO)
#   - PostgreSQL (control plane database)
#   - Alertmanager (alert routing)
#   - Routinator (RPKI validator for BGP analysis)

services:
  # --- Transport ---
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data", "-p", "4222", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # Monitoring/metrics
    volumes:
      - nats-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 64M
    restart: unless-stopped

  # --- Metrics & Visualization ---
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 2G
        reservations:
          cpus: "0.20"
          memory: 256M
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-netvantage}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/home.json
      # Disable anonymous access in production.
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-false}
      # OAuth2/OIDC SSO — set via .env or environment variables.
      - GF_AUTH_GENERIC_OAUTH_ENABLED=${GF_AUTH_OIDC_ENABLED:-false}
      - GF_AUTH_GENERIC_OAUTH_NAME=${GF_AUTH_OIDC_NAME:-SSO}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GF_AUTH_OIDC_CLIENT_ID:-}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GF_AUTH_OIDC_CLIENT_SECRET:-}
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=${GF_AUTH_OIDC_AUTH_URL:-}
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=${GF_AUTH_OIDC_TOKEN_URL:-}
      - GF_AUTH_GENERIC_OAUTH_API_URL=${GF_AUTH_OIDC_API_URL:-}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=${GF_AUTH_OIDC_SCOPES:-openid profile email}
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=${GF_AUTH_OIDC_ROLE_PATH:-}
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      # Security headers.
      - GF_SECURITY_COOKIE_SECURE=${GF_COOKIE_SECURE:-false}
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_SECURITY_X_CONTENT_TYPE_OPTIONS=true
      - GF_SECURITY_X_XSS_PROTECTION=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 32M
    restart: unless-stopped

  # --- Control Plane Database ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netvantage
      POSTGRES_USER: netvantage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netvantage-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.10"
          memory: 128M
    restart: unless-stopped

  # --- RPKI Validator ---
  routinator:
    image: nlnetlabs/routinator:latest
    command: ["server", "--http", "0.0.0.0:8323", "--rtr", "0.0.0.0:3323"]
    ports:
      - "8323:8323"   # HTTP API (RPKI validation queries)
      - "3323:3323"   # RTR protocol (router-to-cache)
    volumes:
      - routinator-data:/home/routinator/.rpki-cache
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.10"
          memory: 128M
    restart: unless-stopped

volumes:
  nats-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  postgres-data:
  routinator-data:
