# Alertmanager configuration for NetVantage
#
# Default routing: all alerts go to a "default" receiver.
# Configure Slack webhook URL and/or email to receive alerts.

global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'alertmanager'
  # smtp_auth_password: 'password'

route:
  group_by: ['alertname', 'prefix', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    # Critical alerts (BGP hijacks, RPKI-invalid, target unreachable) get immediate routing.
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 0s
      repeat_interval: 1h

    # Ping-specific routing — group by target to avoid alert storms.
    - match_re:
        alertname: 'NetVantagePing.*'
      group_by: ['alertname', 'target', 'pop']
      receiver: 'default'
      group_wait: 30s
      repeat_interval: 4h

receivers:
  - name: 'default'
    # Uncomment and configure:
    # slack_configs:
